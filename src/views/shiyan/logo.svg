<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <title>仿真实验平台</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="flask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Flask body (experiment) -->
  <path d="M52 28 L52 52 L30 88 C27.5 92.3 30.6 98 35.6 98 L92.4 98 C97.4 98 100.5 92.3 98 88 L76 52 L76 28"
        fill="none" stroke="url(#flask)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <!-- Flask top bar -->
  <line x1="46" y1="28" x2="82" y2="28" stroke="url(#flask)" stroke-width="4.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Trend line (simulation/forecasting) -->
  <polyline points="28,82 42,74 52,78 62,58 72,62 82,42 98,34"
            fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="28" cy="82" r="4" fill="#C7D2FE"/>
  <circle cx="42" cy="74" r="4" fill="#C7D2FE"/>
  <circle cx="52" cy="78" r="4" fill="#C7D2FE"/>
  <circle cx="62" cy="58" r="5" fill="#E0E7FF"/>
  <circle cx="72" cy="62" r="4" fill="#C7D2FE"/>
  <circle cx="82" cy="42" r="4" fill="#C7D2FE"/>
  <circle cx="98" cy="34" r="5" fill="#FFFFFF"/>
</svg>
