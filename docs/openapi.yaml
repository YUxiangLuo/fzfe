openapi: 3.0.3
info:
  title: Fangzhen Backend API
  version: 1.1.0
  description: |
    REST API for the Fangzhen virtual experiment platform. All secured routes require
    a JWT access token obtained from `/auth/login` and provided through the
    `Authorization: Bearer <token>` header.
servers:
  - url: https://api.example.com/api
    description: Production
  - url: http://localhost:3001/api
    description: Local development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]
    Message:
      type: object
      properties:
        message:
          type: string
      required: [message]
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]
    LoginResponse:
      type: object
      properties:
        token:
          type: string
      required: [token]
    UserSummary:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        email:
          type: string
        role:
          type: string
        phone_number:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [user_id, username, full_name, email, role]
    RegisterUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        full_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [Student, Teacher, Assistant, Admin]
          default: Student
        phone_number:
          type: string
          nullable: true
      required: [username, password, full_name, email]
    AssistantCreateRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 6
        full_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
          nullable: true
        class_ids:
          type: array
          items:
            type: integer
            minimum: 1
          minItems: 1
      required: [username, password, full_name, email, class_ids]
    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
        phone_number:
          type: string
        email:
          type: string
          format: email
      description: At least one field must be provided.
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
      required: [currentPassword, newPassword]
    AdminResetPasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
          minLength: 6
      required: [newPassword]
    PaginationResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        pagination:
          type: object
          properties:
            currentPage:
              type: integer
            pageSize:
              type: integer
            totalItems:
              type: integer
            totalPages:
              type: integer
          required: [currentPage, pageSize, totalItems, totalPages]
    ClassCreateRequest:
      type: object
      properties:
        class_name:
          type: string
        class_code:
          type: string
          nullable: true
      required: [class_name]
    ClassUpdateRequest:
      type: object
      properties:
        class_name:
          type: string
        class_code:
          type: string
          nullable: true
      description: At least one field must be provided.
    ClassResponse:
      type: object
      properties:
        class_id:
          type: integer
        class_name:
          type: string
        class_code:
          type: string
          nullable: true
        teacher_id:
          type: integer
        teacher_name:
          type: string
        created_at:
          type: string
          format: date-time
      required: [class_id, class_name, teacher_id]
    EnrollClassRequest:
      type: object
      properties:
        class_code:
          type: string
      required: [class_code]
    AddAssistantRequest:
      type: object
      properties:
        assistant_id:
          type: integer
          minimum: 1
      required: [assistant_id]
    GradeWeights:
      type: object
      properties:
        teacher_id:
          type: integer
        exp_flow:
          type: number
        exp_flow_demand_data_preparation:
          type: number
        exp_flow_demand_descriptive_stats:
          type: number
        exp_flow_demand_model_selection:
          type: number
        exp_flow_demand_generate_results:
          type: number
        exp_flow_production_inventory_calc:
          type: number
        exp_flow_production_service_level:
          type: number
        exp_flow_production_variable_calc:
          type: number
        exp_flow_production_plan_creation:
          type: number
        exp_flow_report_submission:
          type: number
        knowledge_test:
          type: number
        model_quality:
          type: number
        report_quality:
          type: number
      additionalProperties: false
    GradeWeightsRequest:
      allOf:
        - $ref: '#/components/schemas/GradeWeights'
        - type: object
          properties:
            teacher_id:
              type: integer
              minimum: 1
          required: []
    ExperimentReport:
      type: object
      properties:
        report_id:
          type: integer
        experiment_id:
          type: integer
        student_id:
          type: integer
        student_username:
          type: string
        student_full_name:
          type: string
        report_content:
          type: string
          nullable: true
        pdf_file_path:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        grade:
          type: number
          nullable: true
        feedback:
          type: string
          nullable: true
        graded_by:
          type: integer
          nullable: true
        graded_by_full_name:
          type: string
          nullable: true
        experiment_status:
          type: string
          nullable: true
        selected_industry:
          type: string
          nullable: true
        selected_company:
          type: string
          nullable: true
        selected_product:
          type: string
          nullable: true
    ExperimentStatus:
      type: object
      properties:
        experiment_id:
          type: integer
        student_id:
          type: integer
        student_username:
          type: string
        student_full_name:
          type: string
        start_time:
          type: string
          format: date-time
          nullable: true
        completion_time:
          type: string
          format: date-time
          nullable: true
        last_activity_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        selected_industry:
          type: string
          nullable: true
        selected_company:
          type: string
          nullable: true
        selected_product:
          type: string
          nullable: true
        best_model:
          type: string
          nullable: true
    ExperimentStepEvent:
      type: object
      properties:
        event_id:
          type: integer
        experiment_id:
          type: integer
        student_id:
          type: integer
        class_id:
          type: integer
        step_order:
          type: integer
        event_type:
          type: string
        event_timestamp:
          type: string
          format: date-time
        username:
          type: string
        full_name:
          type: string
    Manual:
      type: object
      properties:
        manual_id:
          type: integer
        file_name:
          type: string
        file_path:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        uploader_id:
          type: integer
          nullable: true
        uploader_name:
          type: string
          nullable: true
        uploaded_at:
          type: string
          format: date-time
      required: [manual_id, file_name, file_path, is_active, uploaded_at]
    ManualUpdateRequest:
      type: object
      properties:
        file_name:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
      description: At least one field must be provided.
    Dataset:
      type: object
      properties:
        dataset_id:
          type: integer
        data_name:
          type: string
        file_path:
          type: string
        description:
          type: string
          nullable: true
        uploaded_at:
          type: string
          format: date-time
      required: [dataset_id, data_name, file_path, uploaded_at]
    DatasetUpdateRequest:
      type: object
      properties:
        data_name:
          type: string
        description:
          type: string
          nullable: true
      description: At least one field must be provided.
    ProductSalesResponse:
      type: object
      properties:
        meta:
          type: object
          properties:
            industry:
              type: string
            company:
              type: string
            product:
              type: string
            name:
              type: string
            description:
              type: string
            unit:
              type: string
          required: [industry, company, product, name, description, unit]
        monthlySales:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
                description: Year-month in YYYY-MM format
              sales:
                type: number
            required: [month, sales]
      required: [meta, monthlySales]
    QuestionBankItem:
      type: object
      properties:
        question_id:
          type: integer
        knowledge_point:
          type: string
          nullable: true
        question_type:
          type: string
        question_text:
          type: string
        options:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties:
                type: string
            - type: 'null'
        correct_answers:
          type: array
          items:
            type: string
        creator_id:
          type: integer
          nullable: true
        creator_name:
          type: string
          nullable: true
      required: [question_id, question_type, question_text, correct_answers]
    QuestionWithoutAnswers:
      type: object
      description: Question payload returned to students without the answer key.
      properties:
        question_id:
          type: integer
        knowledge_point:
          type: string
          nullable: true
        question_type:
          type: string
        question_text:
          type: string
        options:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties:
                type: string
            - type: 'null'
        creator_id:
          type: integer
          nullable: true
        creator_name:
          type: string
          nullable: true
      required: [question_id, question_type, question_text]
    QuestionCreateRequest:
      type: object
      properties:
        knowledge_point:
          type: string
          nullable: true
        question_type:
          type: string
          enum: [Single Choice, Multiple Choice, True/False]
        question_text:
          type: string
        options:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties:
                type: string
        correct_answers:
          type: array
          items:
            type: string
          minItems: 1
      required: [question_type, question_text, correct_answers]
    QuestionUpdateRequest:
      type: object
      properties:
        knowledge_point:
          type: string
        question_type:
          type: string
          enum: [Single Choice, Multiple Choice, True/False]
        question_text:
          type: string
        options:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties:
                type: string
        correct_answers:
          type: array
          items:
            type: string
      description: At least one field must be provided.
paths:
  /auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users:
    post:
      summary: Register a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List users (admin only)
      security:
        - bearerAuth: []
      tags: [Users]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          required: false
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /assistants:
    post:
      summary: Create assistant and assign classes
      security:
        - bearerAuth: []
      tags: [Assistants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantCreateRequest'
      responses:
        '201':
          description: Assistant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          description: Invalid class IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List assistants (admin/teacher)
      security:
        - bearerAuth: []
      tags: [Assistants]
      responses:
        '200':
          description: Assistants list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /teachers/{teacherId}/assistants:
    get:
      summary: Assistants assigned to a teacher's classes
      security:
        - bearerAuth: []
      tags: [Assistants]
      parameters:
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Assistants linked to teacher
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      tags: [Users]
      responses:
        '200':
          description: Profile information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update current user profile
      security:
        - bearerAuth: []
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me/password:
    put:
      summary: Change current user password
      security:
        - bearerAuth: []
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{userId}:
    get:
      summary: Get user by ID
      security:
        - bearerAuth: []
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete user by ID (admin)
      security:
        - bearerAuth: []
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: User deleted with cleanup summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cleanup:
                    type: object
                    additionalProperties: true
        '400':
          description: Invalid operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{userId}/password:
    put:
      summary: Force reset user password (admin)
      security:
        - bearerAuth: []
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminResetPasswordRequest'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /classes:
    post:
      summary: Create class (teacher/admin)
      security:
        - bearerAuth: []
      tags: [Classes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassCreateRequest'
      responses:
        '201':
          description: Class created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Class code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List all classes (admin)
      security:
        - bearerAuth: []
      tags: [Classes]
      responses:
        '200':
          description: Classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /classes/enroll:
    post:
      summary: Student enrolls using class code
      security:
        - bearerAuth: []
      tags: [Classes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollClassRequest'
      responses:
        '200':
          description: Enrollment success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already enrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /classes/{classId}:
    get:
      summary: Get class detail (role aware)
      security:
        - bearerAuth: []
      tags: [Classes]
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Class with members
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update class
      security:
        - bearerAuth: []
      tags: [Classes]
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassUpdateRequest'
      responses:
        '200':
          description: Updated class
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassResponse'
        '400':
          description: No fields provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete class
      security:
        - bearerAuth: []
      tags: [Classes]
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Deletion summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /classes/{classId}/assistants:
    get:
      summary: List assistants for class
      security:
        - bearerAuth: []
      tags: [Classes]
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Assistants list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Add assistant to class
      security:
        - bearerAuth: []
      tags: [Classes]
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAssistantRequest'
      responses:
        '201':
          description: Assistant assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Not an assistant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
